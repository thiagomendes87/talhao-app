document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ra Agropecuária. Cana-de-açúcar consolidada. Precificação central da Talhão: R$ 53,4 milhões, equivalente a R$ 97.500 por hectare. O objetivo deste relatório é justificar tecnicamente essa precificação.\",\"Recomendação final: defender a âncora R$ 97.500 por hectare, equivalente a R$ 53,4 milhões, mirando usinas regionais e fornecedores consolidados. Documentar contrato, outorga e produtividade antes de abrir a negociação amplia significativamente a captura de valor.\",\"Índice em três blocos: Identificação, Técnico e Ambiental, e Jurídico e Conclusão. As seis últimas seções (25 a 30) detalham a tese de pricing.\",\"Dados cadastrais. Matrícula 3.347 do CRI de Potirendaba. SIGEF certificado em outubro de 2023. CAR ativo, atualizado em fevereiro de 2026. Área total 547,76 hectares, aproveitável 341,87 hectares.\",\"Nova Aliança fica no Noroeste Paulista. Cidade-polo: São José do Rio Preto, a 27-28 km. Acesso pela vicinal NVA-030 e conexão à SP-355 e BR-153. São Paulo a 444 km.\",\"Perímetro 11.278 metros. Confronta com Estância Bela Vista (matrículas 5.137) e Fazenda São Marcos (matrícula 68.783). Georreferenciamento certificado pelo INCRA.\",\"Diferencial topográfico forte: declividade não superior a 3%, relevo plano. 100% da área aproveitável é mecanizável. Esse atributo, sozinho, justifica prêmio de 10 a 15% sobre a média regional.\",\"Histórico de uso: cana consolidada há mais de 15 anos. Toda abertura ocorreu antes de 2008, conforme PRODES. Aproveitamento da área útil acima de 60%.\",\"Primeira prancha histórica em fotos, de 2004 a 2016. A sequência confirma que a área já estava aberta e em uso agropecuário antes de 2008, com consolidação progressiva do manejo e sem sinal de abertura recente sobre vegetação nativa.\",\"Segunda prancha histórica em fotos, de 2017 a 2025. As imagens reforçam continuidade do uso agrícola, manutenção do canavial e estabilidade operacional do ativo ao longo do período mais recente.\",\"Aptidão dominante: sucroenergética. O ativo é mais aderente a usinas, fornecedores consolidados e investidores em renda vinculada à cana. Esse universo justifica o teto da faixa de preço.\",\"Solo: Latossolo Vermelho e Argissolo Vermelho-Amarelo. Profundos, bem drenados, aptidão alta para cana. Risco de erosão baixo dado o relevo plano.\",\"Recursos hídricos: poço, córregos e seis açudes. Cobertura potencial de irrigação em 100% da área aproveitável. Outorga ainda não comprovada — comprovar amplia o prêmio.\",\"Clima: precipitação anual de 1.475 mm. Verão chuvoso (nov-mar) e inverno seco (mai-ago). Risco de geada baixo — diferencial sobre fazendas mais ao sul.\",\"Riscos climáticos em ordem: estiagem, calor extremo, incêndios, chuvas intensas. Geada baixa. Os seis açudes da propriedade já mitigam o risco hídrico principal.\",\"Áreas ambientais: Reserva Legal 135,2 hectares (24,8%), APP 56,3 hectares (10,3%), represas 8,65 hectares. RL acima do mínimo de 20% exigido. Total preservado 36,5%.\",\"Regularidade ambiental: CAR ativo e recente, sem embargos, sem desmatamento pós-2008. PRODES limpo.\",\"Regularidade fundiária: matrícula 3.347, SIGEF certificado, pacote geoespacial completo (shapefiles, KML, GeoJSON, GPX, CSV). Pronta para transferência. Praterra é a titular jurídica.\",\"Infraestrutura completa: energia, sede em ótimo estado, curral, poço, açudes, estradas internas. Elimina capex inicial do comprador — diferencial monetizável.\",\"Acesso pela NVA-030, com trecho asfaltado curto e estrada de terra conservada. Universo de usinas compradoras em raio inferior a 80 km. Logística favorável.\",\"Contexto regional: Noroeste Paulista é polo sucroenergético. Demanda firme por etanol e açúcar. Anúncios comparáveis concentram-se entre R$ 85 mil e R$ 105 mil por hectare.\",\"Alavancas de valor: comprovar contrato da cana, intensificar manejo, formalizar outorga. A alavanca maior é o contrato — prazo, ATR, produtividade e remuneração.\",\"Matriz de risco: hídrico-operacional alto (já mitigado pelos açudes), ambiental e fundiário baixos, documental médio. A maior parte dos riscos é endereçável com documentação.\",\"SWOT: forças incluem topografia, cana ativa, solo, água e infraestrutura. Fraquezas são documentais: contrato e outorga. Oportunidade: venda a comprador estratégico.\",\"Núcleo da tese de pricing. Âncora central: R$ 97.500 por hectare, equivalente a R$ 53,4 milhões. Intervalo de confiança operacional de mais ou menos 12%. Range de negociação ampliado: R$ 80 mil a R$ 115 mil por hectare.\",\"Sete comparáveis públicos coletados na região. Cinco deles se concentram entre R$ 85 mil e R$ 105 mil por hectare. A âncora R$ 97,5 mil está no centro dessa faixa — coerente com a mediana de mercado.\",\"Bridge de fatores. Prêmios técnicos somam +30 a +55%: topografia, solo, cana ativa e infraestrutura. Descontos somam -20 a -48%: áreas não produtivas e itens documentais. O líquido suporta R$ 97,5k e dá espaço para subir com documentação adicional.\",\"Três cenários para a mesa de negociação. Conservador R$ 80-90 mil por hectare. Base R$ 90-105 mil — cenário recomendado, onde a âncora se encaixa. Otimista R$ 105-115 mil com comprador estratégico.\",\"Range por perfil de comprador. Usinas pagam R$ 100-115k. Fornecedores consolidados R$ 90-105k. Investidores agro R$ 85-100k. Comprador de renda R$ 80-95k. Mover o perfil-alvo de financeiro para estratégico vale R$ 8-11 milhões.\",\"Recomendação final: defender a âncora R$ 97.500 por hectare, equivalente a R$ 53,4 milhões, mirando usinas regionais e fornecedores consolidados. Documentar contrato, outorga e produtividade antes de abrir a negociação amplia significativamente a captura de valor.\"]\n<\/script>\n\n\n\n</body></html>"
